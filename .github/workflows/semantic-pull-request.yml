name: Validate PR title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize
      - ready_for_review

permissions:
  pull-requests: write

jobs:
  validate-pr:
    name: Validate PR title
    if: ${{ !contains(github.actor, 'dependabot') }}
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50
        id: lint_pr_title
        with:
          requireScope: true
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            perf
            build
            ci
            revert
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in pull request title "{title}"
            didn't match the configured pattern. Please ensure the subject
            doesn't start with an uppercase character.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            PR title must follow this format:

            `type(scope): short lowercase subject`

            Allowed types: `feat`, `fix`, `chore`, `docs`, `refactor`, `test`, `perf`, `build`, `ci`, `revert`.
            Scope rule: use any lowercase kebab-case scope (examples: `api`, `frontend`, `backend`, `electron`, `provider`, `agent`, `tools`, `infra`, `deps`).

            Notes:
            - Use `!` before `:` to mark a breaking change (example: `feat(api)!: remove legacy config format`)
            - `proto` is only for branch names, not PR titles

            Details:

            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

      - if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: pr-title-lint-error
          message: |
            PR title format is valid. Thanks.
