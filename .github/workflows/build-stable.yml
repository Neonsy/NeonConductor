name: Build Stable Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - "Project/package.json"
      - "Project/CHANGELOG.md"

concurrency:
  group: build-stable-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_command: build:win
          - os: macos-latest
            build_command: build:mac
          - os: ubuntu-latest
            build_command: build:linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Guard release
        id: guard
        shell: bash
        run: |
          changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          echo "$changed"
          if echo "$changed" | grep -q "^Project/package.json$" && echo "$changed" | grep -q "^Project/CHANGELOG.md$"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-release commits
        if: steps.guard.outputs.should_release != 'true'
        shell: bash
        run: echo "No release changes detected. Skipping."

      - name: Setup Node
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20

      - name: Setup pnpm
        if: steps.guard.outputs.should_release == 'true'
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 9

      - name: Install
        if: steps.guard.outputs.should_release == 'true'
        run: pnpm -C Project install

      - name: Build and publish
        if: steps.guard.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm -C Project ${{ matrix.build_command }} -- --publish always --config.publish.channel=latest --config.publish.releaseType=release
