name: Build Stable Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - "Project/package.json"
      - "Project/CHANGELOG.md"

concurrency:
  group: build-stable-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_args: --win
          - os: macos-latest
            target_args: --mac --arm64 --x64
          - os: ubuntu-latest
            target_args: --linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Guard release
        id: guard
        shell: bash
        run: |
          changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          echo "$changed"
          if echo "$changed" | grep -q "^Project/package.json$" && echo "$changed" | grep -q "^Project/CHANGELOG.md$"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-release commits
        if: steps.guard.outputs.should_release != 'true'
        shell: bash
        run: echo "No release changes detected. Skipping."

      - name: Setup Node
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20

      - name: Setup pnpm
        if: steps.guard.outputs.should_release == 'true'
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 9

      - name: Install
        if: steps.guard.outputs.should_release == 'true'
        run: pnpm -C Project install

      - name: Build and publish
        if: steps.guard.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          pnpm -C Project build
          pnpm -C Project exec electron-builder ${{ matrix.target_args }} -c electron-builder.json5 --publish always --config.publish.channel=latest --config.publish.releaseType=release

  notes:
    if: github.event.pull_request.merged == true
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Guard release
        id: guard
        shell: bash
        run: |
          changed=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          echo "$changed"
          if echo "$changed" | grep -q "^Project/package.json$" && echo "$changed" | grep -q "^Project/CHANGELOG.md$"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip non-release notes
        if: steps.guard.outputs.should_release != 'true'
        shell: bash
        run: echo "No release changes detected. Skipping notes update."

      - name: Setup Node
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20

      - name: Parse stable release context
        if: steps.guard.outputs.should_release == 'true'
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./Project/package.json').version")"
          TAG="v${VERSION}"
          STABLE_HEADLINE="The conductor just signed off on a new stable release."

          git fetch --tags --force
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -Fxv "$TAG" | head -n1 || true)"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "headline<<EOF"
            echo "$STABLE_HEADLINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Render stable release notes
        if: steps.guard.outputs.should_release == 'true'
        env:
          CHANNEL: stable
          TAG_NAME: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
          PREVIOUS_TAG: ${{ steps.ctx.outputs.previous_tag }}
          CHANNEL_HEADLINE: ${{ steps.ctx.outputs.headline }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/render-release-notes.mjs

      - name: Upsert stable release notes
        if: steps.guard.outputs.should_release == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          TAG_NAME: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const tag = process.env.TAG_NAME;
            const version = process.env.VERSION;
            const body = fs.readFileSync("release-notes.md", "utf8");

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let existing = null;
            for (let attempt = 1; attempt <= 8; attempt += 1) {
              try {
                const found = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                existing = found.data;
                break;
              } catch (error) {
                if (error.status !== 404) throw error;
                if (attempt < 8) {
                  core.info(`Release ${tag} not found yet (attempt ${attempt}/8), retrying...`);
                  await sleep(5000);
                }
              }
            }

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name: existing.name || `Stable ${version}`,
                body,
                prerelease: false,
                draft: false,
              });
              core.info(`Updated stable release notes for ${tag}`);
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: `Stable ${version}`,
                body,
                prerelease: false,
                draft: false,
              });
              core.info(`Created stable release notes for ${tag}`);
            }
