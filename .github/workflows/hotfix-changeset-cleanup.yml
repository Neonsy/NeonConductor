name: Hotfix Changeset Cleanup

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: hotfix-changeset-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Resolve consumed hotfix changesets
        id: consumed
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            if ((pr.head.ref || "") !== "changeset-release/main") {
              core.setOutput("enabled", "false");
              core.info("Merged PR is not the stable version PR.");
              return;
            }

            function parseMetadata(body) {
              const match = String(body || "").match(
                /<!--\s*hotfix-sync-metadata\s*\n([\s\S]*?)\n-->/m
              );
              if (!match) return null;
              try {
                return JSON.parse(match[1]);
              } catch {
                return null;
              }
            }

            async function listChangesetFiles(pullNumber, deletedOnly = false) {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
                per_page: 100,
              });

              return [...new Set(
                files
                  .filter((file) => !deletedOnly || (file.status || "").toLowerCase() === "removed")
                  .map((file) => (file.filename || "").trim())
                  .filter((filename) =>
                    filename.startsWith("Project/.changeset/") &&
                    filename.endsWith(".md") &&
                    filename !== "Project/.changeset/README.md"
                  )
              )].sort((a, b) => a.localeCompare(b));
            }

            const deletedFiles = await listChangesetFiles(pr.number, true);
            if (deletedFiles.length === 0) {
              core.setOutput("enabled", "false");
              core.info("Stable version PR did not consume any changeset markdown files.");
              return;
            }

            const deletedSet = new Set(deletedFiles);
            const mergedMainPulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              base: "main",
              sort: "updated",
              direction: "desc",
              per_page: 100,
            });

            const groupedOrigins = new Map();
            for (const candidate of mergedMainPulls) {
              if (!candidate?.number || candidate.number === pr.number || !candidate.merged_at) continue;

              const headRef = candidate.head?.ref || "";
              const isHotfix = /^[^/]+\/hotfix\/[a-z0-9]+(?:-[a-z0-9]+)*$/.test(headRef);
              const isLaneSync = headRef.startsWith("lane-sync/");
              if (!isHotfix && !isLaneSync) continue;

              let metadata = isLaneSync ? parseMetadata(candidate.body || "") : null;
              let changesetFiles = Array.isArray(metadata?.changeset_files)
                ? metadata.changeset_files
                : [];

              if (isHotfix) {
                changesetFiles = await listChangesetFiles(candidate.number, false);
                metadata = {
                  origin_pr: candidate.number,
                  origin_base: candidate.base?.ref || "main",
                  origin_head: headRef,
                  origin_merge_sha: candidate.merge_commit_sha || "",
                  changeset_files: changesetFiles,
                  changeset_consumed_by_main: true,
                };
              }

              const matchedFiles = changesetFiles.filter((file) => deletedSet.has(file));
              if (matchedFiles.length === 0) continue;

              const key = String(metadata.origin_pr || candidate.number);
              const existing = groupedOrigins.get(key) || {
                origin_pr: metadata.origin_pr || candidate.number,
                origin_base: metadata.origin_base || (candidate.base?.ref || "main"),
                origin_head: metadata.origin_head || headRef,
                origin_merge_sha: metadata.origin_merge_sha || (candidate.merge_commit_sha || ""),
                changeset_consumed_by_main: true,
                changeset_files: [],
              };

              existing.changeset_files = [...new Set([...existing.changeset_files, ...matchedFiles])].sort((a, b) =>
                a.localeCompare(b)
              );
              groupedOrigins.set(key, existing);
            }

            const origins = [...groupedOrigins.values()].filter(
              (entry) => Array.isArray(entry.changeset_files) && entry.changeset_files.length > 0
            );

            core.setOutput("enabled", origins.length > 0 ? "true" : "false");
            core.setOutput("origins_json", JSON.stringify(origins));

      - name: Skip when no hotfix cleanup is needed
        if: steps.consumed.outputs.enabled != 'true'
        run: echo "No consumed hotfix changesets were found for cleanup."

      - name: Checkout repository
        if: steps.consumed.outputs.enabled == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Open selective cleanup PRs
        if: steps.consumed.outputs.enabled == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ORIGINS_JSON: ${{ steps.consumed.outputs.origins_json }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}.git"
          git config user.name "NeonConductor Release Bot"
          git config user.email "118444485+Neonsy@users.noreply.github.com"

          git fetch origin dev prev --force
          short_sha="$(printf '%s' "$PR_HEAD_SHA" | cut -c1-7)"

          while IFS=$'\t' read -r origin_pr origin_base origin_head origin_merge_sha changeset_files; do
            [ -z "${origin_pr:-}" ] && continue

            for target in prev dev; do
              branch="changeset-sync/hotfix-cleanup/${target}/${origin_pr}-${short_sha}"
              git checkout -B "$branch" "origin/$target"

              deleted_lines_file="$(mktemp)"
              skipped_lines_file="$(mktemp)"
              : > "$deleted_lines_file"
              : > "$skipped_lines_file"
              has_deletions="false"

              IFS='|' read -r -a file_array <<< "$changeset_files"
              for file_path in "${file_array[@]}"; do
                [ -z "${file_path:-}" ] && continue

                expected_blob="$(git rev-parse "${PR_BASE_SHA}:${file_path}" 2>/dev/null || true)"
                target_blob="$(git rev-parse "origin/${target}:${file_path}" 2>/dev/null || true)"

                if [ -z "$expected_blob" ]; then
                  printf '%s\n' "- \`$file_path\` skipped: file is absent from the pre-version main snapshot." >> "$skipped_lines_file"
                  continue
                fi
                if [ -z "$target_blob" ]; then
                  printf '%s\n' "- \`$file_path\` skipped: already absent on \`${target}\`." >> "$skipped_lines_file"
                  continue
                fi
                if [ "$expected_blob" != "$target_blob" ]; then
                  printf '%s\n' "- \`$file_path\` skipped: content mismatch on \`${target}\`." >> "$skipped_lines_file"
                  continue
                fi

                git rm --quiet -- "$file_path"
                printf '%s\n' "- \`$file_path\`" >> "$deleted_lines_file"
                has_deletions="true"
              done

              if [ "$has_deletions" != "true" ]; then
                echo "No selective cleanup deletions required for origin #${origin_pr} on ${target}."
                continue
              fi

              git commit -m "chore(release): cleanup consumed hotfix changeset #${origin_pr} from ${target}"

              deleted_lines="$(cat "$deleted_lines_file")"
              skipped_lines="$(cat "$skipped_lines_file" 2>/dev/null || true)"
              if [ -z "$skipped_lines" ]; then
                skipped_lines="- _none_"
              fi

              git push --force-with-lease origin "$branch"

              metadata_json="$(
                ORIGIN_PR="$origin_pr" ORIGIN_BASE="$origin_base" ORIGIN_HEAD="$origin_head" ORIGIN_MERGE_SHA="$origin_merge_sha" CHANGESET_FILES="$changeset_files" node --input-type=module - <<'NODE'
                const files = (process.env.CHANGESET_FILES || "")
                  .split("|")
                  .map((entry) => entry.trim())
                  .filter(Boolean)
                  .sort((a, b) => a.localeCompare(b));
                process.stdout.write(
                  JSON.stringify({
                    origin_pr: Number(process.env.ORIGIN_PR),
                    origin_base: process.env.ORIGIN_BASE,
                    origin_head: process.env.ORIGIN_HEAD,
                    origin_merge_sha: process.env.ORIGIN_MERGE_SHA,
                    changeset_files: files,
                    changeset_consumed_by_main: true,
                  }),
                );
                NODE
              )"

              comment="$(
                METADATA_JSON="$metadata_json" node --input-type=module - <<'NODE'
                import { buildHotfixSyncMetadataComment } from "./.github/scripts/hotfix-sync-metadata.mjs";
                process.stdout.write(
                  buildHotfixSyncMetadataComment(JSON.parse(process.env.METADATA_JSON)),
                );
                NODE
              )"

              ORIGIN_PR="$origin_pr" TARGET="$target" DELETED_LINES="$deleted_lines" SKIPPED_LINES="$skipped_lines" COMMENT="$comment" node --input-type=module - <<'NODE' > cleanup-pr-body.md
              const lines = [
                `Auto-generated cleanup after stable consumed the hotfix changeset from origin PR #${process.env.ORIGIN_PR}.`,
                "",
                `Files removed from \`${process.env.TARGET}\`:`,
                process.env.DELETED_LINES || "- _none_",
                "",
                "Files skipped:",
                process.env.SKIPPED_LINES || "- _none_",
                "",
                process.env.COMMENT || "",
              ];
              process.stdout.write(`${lines.join("\n")}\n`);
              NODE

              existing_pr="$(
                gh pr list \
                  --repo "${REPO_OWNER}/${REPO_NAME}" \
                  --head "$branch" \
                  --base "$target" \
                  --state open \
                  --json number \
                  --jq '.[0].number // ""'
              )"

              title="chore(release): cleanup consumed hotfix changeset #${origin_pr} from ${target}"
              if [ -n "$existing_pr" ]; then
                gh pr edit "$existing_pr" \
                  --repo "${REPO_OWNER}/${REPO_NAME}" \
                  --title "$title" \
                  --body-file cleanup-pr-body.md
              else
                gh pr create \
                  --repo "${REPO_OWNER}/${REPO_NAME}" \
                  --base "$target" \
                  --head "$branch" \
                  --title "$title" \
                  --body-file cleanup-pr-body.md \
                  --label "automation: changeset-cleanup" \
                  --label "ignore-for-release"
              fi
            done
          done < <(
            ORIGINS_JSON="$ORIGINS_JSON" node --input-type=module - <<'NODE'
            const origins = JSON.parse(process.env.ORIGINS_JSON);
            for (const origin of origins) {
              const files = Array.isArray(origin.changeset_files)
                ? origin.changeset_files.join("|")
                : "";
              process.stdout.write(
                `${origin.origin_pr}\t${origin.origin_base}\t${origin.origin_head}\t${origin.origin_merge_sha}\t${files}\n`,
              );
            }
            NODE
          )
