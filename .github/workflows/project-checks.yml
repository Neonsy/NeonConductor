name: Project Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: project-checks-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version-file: Project/.nvmrc
          cache: pnpm
          cache-dependency-path: Project/pnpm-lock.yaml

      - name: Install
        run: pnpm -C Project install --frozen-lockfile

      - name: Check
        run: pnpm -C Project check:fast

      - name: Build
        run: pnpm -C Project build:app

      - name: Agent audit worklist
        continue-on-error: true
        run: pnpm -C Project audit:agents:worklist:new
