name: Build Prerelease Shared

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      channel_title:
        required: true
        type: string
      tag_pattern:
        required: true
        type: string
      target_branch:
        required: true
        type: string

concurrency:
  group: build-prerelease-${{ inputs.channel }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      tag: ${{ steps.guard.outputs.tag }}
      version: ${{ steps.guard.outputs.version }}
      channel: ${{ steps.guard.outputs.channel }}
      channel_title: ${{ steps.guard.outputs.channel_title }}
      release_name: ${{ steps.guard.outputs.release_name }}
      is_prerelease: ${{ steps.guard.outputs.is_prerelease }}
      headline: ${{ steps.guard.outputs.headline }}
    steps:
      - name: Guard tag context
        id: guard
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          CHANNEL_TITLE: ${{ inputs.channel_title }}
          TAG_PATTERN: ${{ inputs.tag_pattern }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          case "$CHANNEL" in
            alpha)
              CHANNEL_HEADLINE="The conductor has whipped up a new experimental version to try out. Use with caution, as it might be unstable."
              ;;
            beta)
              CHANNEL_HEADLINE="The conductor has pushed these new updates to the preview stage. This update should be safe to try, right?"
              ;;
            *)
              echo "Unsupported prerelease channel: $CHANNEL"
              exit 1
              ;;
          esac

          TAG="${REF_NAME:-}"
          VERSION="${TAG#v}"
          RELEASE_NAME="${CHANNEL_TITLE} ${VERSION}"

          if [[ "${REF_TYPE:-}" != "tag" ]]; then
            echo "Ref ${REF:-<unknown>} is not a tag. Skipping ${CHANNEL} prerelease workflow."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$TAG" || "$TAG" != $TAG_PATTERN ]]; then
            echo "Tag '$TAG' does not match expected pattern '$TAG_PATTERN' for ${CHANNEL}. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "channel_title=$CHANNEL_TITLE" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          {
            echo "headline<<EOF"
            echo "$CHANNEL_HEADLINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    if: needs.guard.outputs.should_release == 'true'
    needs: guard
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        working-directory: s
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_args: --win
          - os: macos-latest
            target_args: --mac --arm64 --x64
          - os: ubuntu-latest
            target_args: --linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          path: s

      - name: Validate tag branch
        shell: bash
        env:
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          git fetch origin \
            "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}" \
            --force --tags

          target_ref="origin/${TARGET_BRANCH}"
          target_head="$(git rev-parse "$target_ref")"
          if [[ "$GITHUB_SHA" != "$target_head" ]]; then
            echo "Tag commit $GITHUB_SHA is not the current head of $target_ref ($target_head)."
            echo "Refusing prerelease publish from a stale branch commit."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24.13.1
          cache: pnpm
          cache-dependency-path: s/Project/pnpm-lock.yaml

      - name: Configure pnpm for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cat > Project/.npmrc <<'EOF'
          node-linker=hoisted
          virtual-store-dir=.pnpm
          EOF

      - name: Install
        run: pnpm -C Project install --frozen-lockfile

      - name: Build package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          VERSION="${{ needs.guard.outputs.version }}"
          CHANNEL="${{ needs.guard.outputs.channel }}"
          pnpm -C Project build
          pnpm -C Project exec electron-builder ${{ matrix.target_args }} -c electron-builder.json5 --publish never --config.extraMetadata.version="$VERSION" --config.publish.channel="$CHANNEL" --config.publish.releaseType=prerelease

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.guard.outputs.version }}"
          CHANNEL="${{ needs.guard.outputs.channel }}"
          RELEASE_DIR="Project/release/${VERSION}"
          STAGE_DIR="Project/release-assets"
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"

          find "$RELEASE_DIR" -maxdepth 1 -type f \
            \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.blockmap" -o -name "latest*.yml" -o -name "latest*.yaml" -o -name "${CHANNEL}*.yml" -o -name "${CHANNEL}*.yaml" \) \
            -print0 |
          while IFS= read -r -d '' file; do
            cp "$file" "$STAGE_DIR/$(basename "$file")"
          done

          file_count="$(find "$STAGE_DIR" -type f | wc -l | tr -d ' ')"
          if [ "$file_count" = "0" ]; then
            echo "No release assets staged from $RELEASE_DIR"
            exit 1
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: release-assets-${{ matrix.os }}-${{ needs.guard.outputs.version }}
          path: s/Project/release-assets/**
          if-no-files-found: error

  notes:
    if: needs.guard.outputs.should_release == 'true'
    needs: [guard, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      tag: ${{ steps.ctx.outputs.tag }}
      version: ${{ steps.ctx.outputs.version }}
      channel: ${{ steps.ctx.outputs.channel }}
      channel_title: ${{ steps.ctx.outputs.channel_title }}
      release_name: ${{ steps.ctx.outputs.release_name }}
      is_prerelease: ${{ steps.ctx.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24.13.1

      - name: Resolve prerelease context
        id: ctx
        shell: bash
        env:
          TAG: ${{ needs.guard.outputs.tag }}
          VERSION: ${{ needs.guard.outputs.version }}
          CHANNEL: ${{ needs.guard.outputs.channel }}
          CHANNEL_TITLE: ${{ needs.guard.outputs.channel_title }}
          RELEASE_NAME: ${{ needs.guard.outputs.release_name }}
          CHANNEL_HEADLINE: ${{ needs.guard.outputs.headline }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          PREVIOUS_TAG="$(git tag --list "v*-${CHANNEL}.*" --sort=-v:refname | grep -Fxv "$TAG" | head -n1 || true)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "channel_title=$CHANNEL_TITLE" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "headline<<EOF"
            echo "$CHANNEL_HEADLINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Render prerelease release notes
        env:
          CHANNEL: ${{ steps.ctx.outputs.channel }}
          TAG_NAME: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
          PREVIOUS_TAG: ${{ steps.ctx.outputs.previous_tag }}
          CHANNEL_HEADLINE: ${{ steps.ctx.outputs.headline }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/render-release-notes.mjs

      - name: Upload release notes artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: release-notes-${{ steps.ctx.outputs.tag }}
          path: release-notes.md
          if-no-files-found: error

  publish_release:
    if: needs.guard.outputs.should_release == 'true'
    needs: [guard, build, notes]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1

      - name: Download built assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          pattern: release-assets-*-${{ needs.notes.outputs.version }}
          merge-multiple: true
          path: dist-assets

      - name: Download release notes
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: release-notes-${{ needs.notes.outputs.tag }}
          path: release-notes

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24.13.1
          cache: pnpm
          cache-dependency-path: Project/pnpm-lock.yaml

      - name: Install workflow script dependencies
        run: pnpm -C Project install --frozen-lockfile

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Ensure draft release exists
        id: ensure_release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          TAG_NAME: ${{ needs.notes.outputs.tag }}
          RELEASE_NAME: ${{ needs.notes.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.notes.outputs.is_prerelease }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.TAG_NAME;
            const releaseName = process.env.RELEASE_NAME;
            const prerelease = process.env.IS_PRERELEASE === "true";

            let existing = null;
            try {
              const found = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              existing = found.data;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            if (existing && !existing.draft) {
              core.setFailed(`Release ${tag} is already published. Immutable rerun policy blocks republish.`);
              return;
            }

            let release = existing;
            if (!release) {
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: releaseName,
                body: "Preparing release assets...",
                prerelease,
                draft: true,
              });
              release = created.data;
              core.info(`Created draft release for ${tag}`);
            } else {
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name: releaseName,
                prerelease,
                draft: true,
              });
              release = updated.data;
              core.info(`Reusing existing draft release for ${tag}`);
            }

            core.setOutput("release_id", String(release.id));

      - name: Upload all assets to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          TAG_NAME: ${{ needs.notes.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No assets found in dist-assets"
            exit 1
          fi

          UPLOAD_DIR="upload-assets"
          rm -rf "$UPLOAD_DIR"
          mkdir -p "$UPLOAD_DIR"

          declare -A counts
          for file in "${files[@]}"; do
            base="$(basename "$file")"
            counts["$base"]=$(( ${counts["$base"]:-0} + 1 ))
          done

          for file in "${files[@]}"; do
            base="$(basename "$file")"
            stem="${base%.*}"
            if [ "$stem" = "$base" ]; then
              ext=""
            else
              ext=".${base##*.}"
            fi

            dest="$UPLOAD_DIR/$base"
            if [ "${counts["$base"]}" -gt 1 ]; then
              rel="${file#dist-assets/}"
              suffix="$(printf '%s' "$rel" | sha256sum | cut -c1-8)"
              dest="$UPLOAD_DIR/${stem}-${suffix}${ext}"
            fi
            cp "$file" "$dest"
          done

          mapfile -d '' upload_files < <(find "$UPLOAD_DIR" -type f -print0)
          gh release upload "$TAG_NAME" "${upload_files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

      - name: Validate updater metadata against uploaded release assets
        shell: bash
        env:
          RELEASE_ID: ${{ steps.ensure_release.outputs.release_id }}
          TAG_NAME: ${{ needs.notes.outputs.tag }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY' | node .github/scripts/validate-update-metadata.mjs
          from pathlib import Path
          import json
          import sys

          manifests = []
          for path in sorted(Path("dist-assets").rglob("*")):
            if path.is_file() and path.suffix.lower() in {".yml", ".yaml"}:
              manifests.append({
                "name": path.name,
                "content": path.read_text(encoding="utf-8"),
              })

          if not manifests:
            raise SystemExit("No updater metadata files found in dist-assets.")

          sys.stdout.write(json.dumps(manifests))
          PY

      - name: Publish release with final notes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          RELEASE_ID: ${{ steps.ensure_release.outputs.release_id }}
          TAG_NAME: ${{ needs.notes.outputs.tag }}
          RELEASE_NAME: ${{ needs.notes.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.notes.outputs.is_prerelease }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const tag = process.env.TAG_NAME;
            const releaseName = process.env.RELEASE_NAME;
            const prerelease = process.env.IS_PRERELEASE === "true";
            const body = fs.readFileSync("release-notes/release-notes.md", "utf8");

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              tag_name: tag,
              name: releaseName,
              body,
              prerelease,
              draft: false,
            });
            core.info(`Published ${tag} with grouped assets.`);

      - name: Publish updater metadata to GitHub Pages
        shell: bash
        env:
          CHANNEL: ${{ needs.notes.outputs.channel }}
          TAG_NAME: ${{ needs.notes.outputs.tag }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          PAGES_BOT_NAME: ${{ vars.PAGES_BOT_NAME }}
          PAGES_BOT_EMAIL: ${{ vars.PAGES_BOT_EMAIL }}
        run: |
          set -euo pipefail

          PAGES_BRANCH="${PAGES_BRANCH:-gh-pages}"
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}.git"
          TEMP_ROOT="$(mktemp -d)"
          SITE_DIR="$TEMP_ROOT/site"

          if git clone --depth 1 --branch "$PAGES_BRANCH" "$REMOTE_URL" "$SITE_DIR"; then
            :
          else
            mkdir -p "$SITE_DIR"
            git -C "$SITE_DIR" init
            git -C "$SITE_DIR" checkout -b "$PAGES_BRANCH"
            git -C "$SITE_DIR" remote add origin "$REMOTE_URL"
          fi

          git -C "$SITE_DIR" config user.name "$PAGES_BOT_NAME"
          git -C "$SITE_DIR" config user.email "$PAGES_BOT_EMAIL"

          PUBLISH_PAYLOAD="$(SITE_DIR="$SITE_DIR" CHANNEL="$CHANNEL" REPO_OWNER="$REPO_OWNER" REPO_NAME="$REPO_NAME" TAG_NAME="$TAG_NAME" python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import sys

          input_manifests = []
          for path in sorted(Path("dist-assets").rglob("*")):
            if path.is_file() and path.suffix.lower() in {".yml", ".yaml"}:
              input_manifests.append({
                "name": path.name,
                "content": path.read_text(encoding="utf-8"),
              })

          if not input_manifests:
            raise SystemExit("No updater metadata files found in dist-assets.")

          site_dir = Path(os.environ["SITE_DIR"])
          existing_channels = {}
          for lane in ("stable", "beta", "alpha"):
            manifests = []
            channel_dir = site_dir / "updates" / lane
            if channel_dir.exists():
              for path in sorted(channel_dir.iterdir(), key=lambda item: item.name):
                if path.is_file() and path.suffix.lower() in {".yml", ".yaml"}:
                  manifests.append({
                    "name": path.name,
                    "content": path.read_text(encoding="utf-8"),
                  })
            existing_channels[lane] = manifests

          sys.stdout.write(json.dumps({
            "channel": os.environ["CHANNEL"],
            "owner": os.environ["REPO_OWNER"],
            "repo": os.environ["REPO_NAME"],
            "tagName": os.environ["TAG_NAME"],
            "inputManifests": input_manifests,
            "existingChannels": existing_channels,
          }))
          PY
          )"

          RENDERED_SITE="$(printf '%s' "$PUBLISH_PAYLOAD" | node .github/scripts/publish-update-site.mjs)"

          printf '%s' "$RENDERED_SITE" | SITE_DIR="$SITE_DIR" CHANNEL="$CHANNEL" python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import shutil
          import sys

          payload = json.load(sys.stdin)
          site_dir = Path(os.environ["SITE_DIR"])
          channel_dir = site_dir / "updates" / os.environ["CHANNEL"]

          shutil.rmtree(channel_dir, ignore_errors=True)
          channel_dir.mkdir(parents=True, exist_ok=True)

          for manifest in payload["manifests"]:
            (channel_dir / manifest["name"]).write_text(manifest["content"], encoding="utf-8")

          for page in payload["pages"]:
            destination = site_dir / Path(page["path"])
            destination.parent.mkdir(parents=True, exist_ok=True)
            destination.write_text(page["content"], encoding="utf-8")
          PY

          git -C "$SITE_DIR" add .
          if [ -z "$(git -C "$SITE_DIR" status --short)" ]; then
            echo "No Pages changes detected for $CHANNEL $TAG_NAME."
            exit 0
          fi

          git -C "$SITE_DIR" commit -m "docs(updates): publish $CHANNEL feed for $TAG_NAME"
          git -C "$SITE_DIR" push origin "$PAGES_BRANCH"
          echo "Published $CHANNEL updater feed for $TAG_NAME to $PAGES_BRANCH."
