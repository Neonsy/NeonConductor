name: Build Prerelease

on:
  push:
    tags:
      - "v*-alpha.*"
      - "v*-beta.*"

concurrency:
  group: build-prerelease-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_args: --win
          - os: macos-latest
            target_args: --mac --arm64 --x64
          - os: ubuntu-latest
            target_args: --linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Parse tag
        id: tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "$TAG" == *"-alpha."* ]]; then
            CHANNEL="alpha"
          elif [[ "$TAG" == *"-beta."* ]]; then
            CHANNEL="beta"
          else
            echo "Unsupported tag: $TAG"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Validate tag branch
        shell: bash
        run: |
          git fetch origin dev prev --depth=1
          if [ "${{ steps.tag.outputs.channel }}" = "alpha" ]; then
            git branch -r --contains "$GITHUB_SHA" | grep -q "origin/dev"
          else
            git branch -r --contains "$GITHUB_SHA" | grep -q "origin/prev"
          fi

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 9

      - name: Install
        run: pnpm -C Project install

      - name: Build and publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          CHANNEL="${{ steps.tag.outputs.channel }}"
          pnpm -C Project build
          pnpm -C Project exec electron-builder ${{ matrix.target_args }} -c electron-builder.json5 --publish always --config.extraMetadata.version="$VERSION" --config.publish.channel="$CHANNEL" --config.publish.releaseType=prerelease

  notes:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20

      - name: Parse prerelease context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [[ "$TAG" == *"-alpha."* ]]; then
            CHANNEL="alpha"
            CHANNEL_TITLE="Alpha"
            CHANNEL_HEADLINE="The conductor has whipped up a new experimental version to try out. Use with caution, as it might be unstable."
          elif [[ "$TAG" == *"-beta."* ]]; then
            CHANNEL="beta"
            CHANNEL_TITLE="Beta"
            CHANNEL_HEADLINE="The conductor has pushed these new updates to the preview stage. This update should be safe to try, right?"
          else
            echo "Unsupported tag: $TAG"
            exit 1
          fi

          git fetch --tags --force
          PREVIOUS_TAG="$(git tag --list "v*-${CHANNEL}.*" --sort=-v:refname | grep -Fxv "$TAG" | head -n1 || true)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "channel_title=$CHANNEL_TITLE" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          {
            echo "headline<<EOF"
            echo "$CHANNEL_HEADLINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Render prerelease release notes
        env:
          CHANNEL: ${{ steps.ctx.outputs.channel }}
          TAG_NAME: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
          PREVIOUS_TAG: ${{ steps.ctx.outputs.previous_tag }}
          CHANNEL_HEADLINE: ${{ steps.ctx.outputs.headline }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/render-release-notes.mjs

      - name: Upsert prerelease release notes
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          TAG_NAME: ${{ steps.ctx.outputs.tag }}
          VERSION: ${{ steps.ctx.outputs.version }}
          CHANNEL: ${{ steps.ctx.outputs.channel }}
          CHANNEL_TITLE: ${{ steps.ctx.outputs.channel_title }}
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const tag = process.env.TAG_NAME;
            const version = process.env.VERSION;
            const channelTitle = process.env.CHANNEL_TITLE;
            const name = `${channelTitle} ${version}`;
            const body = fs.readFileSync("release-notes.md", "utf8");

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let existing = null;
            for (let attempt = 1; attempt <= 8; attempt += 1) {
              try {
                const found = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                existing = found.data;
                break;
              } catch (error) {
                if (error.status !== 404) throw error;
                if (attempt < 8) {
                  core.info(`Release ${tag} not found yet (attempt ${attempt}/8), retrying...`);
                  await sleep(5000);
                }
              }
            }

            if (existing) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name,
                body,
                prerelease: true,
                draft: false,
              });
              core.info(`Updated prerelease notes for ${tag}`);
            } else {
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name,
                body,
                prerelease: true,
                draft: false,
              });
              core.info(`Created prerelease notes for ${tag}`);
            }
