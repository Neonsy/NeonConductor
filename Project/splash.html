<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NeonConductor</title>
        <link rel="stylesheet" href="/src/splash/styles.css" />
    </head>
    <body data-boot-stage="main_initializing">
        <main class="splash-shell" aria-live="polite">
            <div class="splash-mascot">
                <img data-splash-mascot alt="NeonConductor mascot" width="168" height="212" />
            </div>
            <h1 id="splash-headline">Starting NeonConductor</h1>
            <p id="splash-subtitle">Initializing the desktop runtime.</p>
            <p id="splash-diagnostics" class="splash-diagnostics">Elapsed: 0ms</p>
            <div class="splash-progress" aria-hidden="true"></div>
        </main>
        <script>
            (() => {
                const bootstrapPayload = window.neonSplash?.getBootstrapPayload();
                const mascotImage = document.querySelector('[data-splash-mascot]');
                if (
                    mascotImage instanceof HTMLImageElement &&
                    bootstrapPayload?.mascotSource &&
                    mascotImage.src !== bootstrapPayload.mascotSource
                ) {
                    mascotImage.src = bootstrapPayload.mascotSource;
                }
            })();
        </script>
        <script type="module" src="/src/splash/main.ts"></script>
    </body>
</html>
